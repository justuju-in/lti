version: '3.8'

networks:
  web:
    driver: bridge

services:
  traefik:
    image: traefik:v2.9
    command:
      - --providers.docker
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=chhotu@justuju.in
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - web

  backend:
    build:
      context: ./backend
    environment:
      - LTI_JWT_SECRET=supersecret
    expose:
      - "3000"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.lti-backend-api.rule=Host(`lti.csbasics.in`) && (PathPrefix(`/api`) || PathPrefix(`/login`) || PathPrefix(`/keys`) || PathPrefix(`/register`))
      - traefik.http.routers.lti-backend-api.entrypoints=websecure
      - traefik.http.routers.lti-backend-api.tls=true
      - traefik.http.routers.lti-backend-api.tls.certresolver=myresolver
      - traefik.http.routers.lti-backend-api.service=lti-backend
      - traefik.http.routers.lti-backend-api.priority=100
      - traefik.http.routers.lti-backend-launch.rule=Host(`lti.csbasics.in`) && Path(`/`)
      - traefik.http.routers.lti-backend-launch.entrypoints=websecure
      - traefik.http.routers.lti-backend-launch.tls=true
      - traefik.http.routers.lti-backend-launch.tls.certresolver=myresolver
      - traefik.http.routers.lti-backend-launch.service=lti-backend
      - traefik.http.routers.lti-backend-launch.priority=99
      - traefik.http.services.lti-backend.loadbalancer.server.port=3000
    depends_on:
      - traefik

  frontend:
    build:
      context: ./frontend
    environment:
      - NODE_ENV=production
    expose:
      - "3001"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.lti-frontend.rule=Host(`lti.csbasics.in`) && PathPrefix(`/lti-launch`)
      - traefik.http.routers.lti-frontend.entrypoints=websecure
      - traefik.http.routers.lti-frontend.tls=true
      - traefik.http.routers.lti-frontend.tls.certresolver=myresolver
      - traefik.http.services.lti-frontend.loadbalancer.server.port=3001
      - traefik.http.routers.lti-frontend.priority=50
    depends_on:
      - traefik
      - backend
