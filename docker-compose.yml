version: '3.8'

networks:
  web:
    driver: bridge

services:
  traefik:
    image: traefik:v2.9
    command:
      - --providers.docker
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=chhotu@justuju.in
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - web

  backend:
    build:
      context: ./backend
    environment:
      - LTI_JWT_SECRET=supersecret
    expose:
      - "3000"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.lti-backend.rule=Host(`lti.csbasics.in`)
      - traefik.http.routers.lti-backend.entrypoints=websecure
      - traefik.http.routers.lti-backend.tls=true
      - traefik.http.routers.lti-backend.tls.certresolver=myresolver
      - traefik.http.services.lti-backend.loadbalancer.server.port=3000
      - traefik.http.routers.lti-backend.priority=50
    depends_on:
      - traefik

  frontend:
    build:
      context: ./frontend
    environment:
      - NODE_ENV=production
    expose:
      - "3001"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.lti-frontend.rule=Host(`lti.csbasics.in`) && PathPrefix(`/lti-launch`)
      - traefik.http.routers.lti-frontend.entrypoints=websecure
      - traefik.http.routers.lti-frontend.tls=true
      - traefik.http.routers.lti-frontend.tls.certresolver=myresolver
      - traefik.http.services.lti-frontend.loadbalancer.server.port=3001
      - traefik.http.routers.lti-frontend.priority=100
    depends_on:
      - traefik
      - backend
