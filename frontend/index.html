<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Quiz App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f4;
    }

    .quiz-container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h3 {
      margin-bottom: 20px;
    }

    .option-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      cursor: pointer;
      background-color: #eee;
      border: none;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .option-btn:hover {
      background-color: #ddd;
    }

    .result {
      text-align: center;
    }

    .restart-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="quiz-container" id="quiz">
    <!-- Quiz content will be rendered here -->
  </div>

  <script>
    const quizData = [
      { q: '2 + 2 = ?', options: ['3', '4', '5'], answer: '4' },
      { q: 'Capital of India?', options: ['Delhi', 'Mumbai', 'Kolkata'], answer: 'Delhi' }
    ];

    let currentStep = 0;
    let score = 0;

    const quizContainer = document.getElementById('quiz');

    function renderQuestion() {
      const current = quizData[currentStep];
      quizContainer.innerHTML = `
        <h3>${current.q}</h3>
        ${current.options.map(opt => `
          <button class="option-btn" onclick="handleAnswer('${opt}')">${opt}</button>
        `).join('')}
      `;
    }

    function handleAnswer(selected) {
      if (selected === quizData[currentStep].answer) {
        score++;
      }

      currentStep++;
      if (currentStep < quizData.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizContainer.innerHTML = `
        <div class="result">
          <h2>Your score: ${score}/${quizData.length}</h2>
          <button class="restart-btn" onclick="restartQuiz()">Restart</button>
        </div>
      `;
    }

    function restartQuiz() {
      currentStep = 0;
      score = 0;
      renderQuestion();
    }

    // Start quiz
    renderQuestion();
  </script>

</body>
</html>
